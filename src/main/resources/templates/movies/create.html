<!doctype html>
<html lang="sv" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skapa film</title>
</head>
<body>
    <h1>Skapa ny film</h1>

    <form th:action="@{/movies/create}" th:object="${movie}" method="post">
        <div>
            <label for="title">Titel</label>
            <input type="text" id="title" th:field="*{title}">
            <div th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Fel</div>
        </div>

        <div>
            <label for="description">Beskrivning</label>
            <textarea id="description" th:field="*{description}"></textarea>
            <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Fel</div>
        </div>

        <div>
            <label for="releaseDate">Releasedatum</label>
            <input type="date" id="releaseDate" th:field="*{releaseDate}">
            <div th:if="${#fields.hasErrors('releaseDate')}" th:errors="*{releaseDate}">Fel</div>
        </div>

        <div>
            <label for="director">Regissör</label>
            <input type="text" id="director" th:field="*{director}">
            <div th:if="${#fields.hasErrors('director')}" th:errors="*{director}">Fel</div>
        </div>

        <div>
            <label for="durationMinutes">Längd (min)</label>
            <input type="number" id="durationMinutes" th:field="*{durationMinutes}">
            <div th:if="${#fields.hasErrors('durationMinutes')}" th:errors="*{durationMinutes}">Fel</div>
        </div>

        <div>
            <label for="genre">Genre</label>
            <input type="text" id="genre" th:field="*{genre}">
            <div th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}">Fel</div>
        </div>

        <button type="submit">Spara</button>
    </form>

    <p>
        <a th:href="@{/movies}">Tillbaka till listan</a>    </p>
</body>
</html>
